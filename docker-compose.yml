version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: redis-local
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis-data:/data

  redis-ui:
    image: rediscommander/redis-commander
    container_name: redis-ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
volumes:
  redis-data:

